<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee DTR — UBMS Time-In/Out</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- face-api.js for facial recognition -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #0d1b2a;
            --accent: #00897b;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1a202c;
            --text-muted: #718096;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* ---- Header ---- */
        .kiosk-header {
            background: var(--company-color, var(--primary));
            color: white;
            padding: 20px 24px 16px;
            text-align: center;
            position: relative;
        }
        .kiosk-logo {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            margin: 0 auto 10px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .kiosk-logo img { width: 100%; height: 100%; object-fit: contain; }
        .kiosk-logo i { font-size: 28px; color: white; }
        .kiosk-company { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
        .kiosk-subtitle { font-size: 12px; opacity: 0.75; }
        /* ---- Live Clock ---- */
        .clock-box {
            background: var(--company-color, var(--primary));
            color: white;
            text-align: center;
            padding: 0 24px 24px;
        }
        .clock-time {
            font-size: clamp(40px, 12vw, 72px);
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
        }
        .clock-date {
            font-size: 14px;
            opacity: 0.75;
            margin-top: 4px;
        }
        /* ---- Main content ---- */
        .kiosk-body {
            flex: 1;
            padding: 20px 16px 32px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        /* ---- Employee List ---- */
        .emp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }
        @media (max-width: 360px) { .emp-grid { grid-template-columns: 1fr; } }
        .emp-btn {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .emp-btn:hover, .emp-btn.selected {
            border-color: var(--company-color, var(--accent));
            background: var(--company-bg, #e8f5e9);
            box-shadow: 0 0 0 2px var(--company-color, var(--accent))30;
        }
        .emp-btn.selected { border-width: 2.5px; }
        .emp-avatar {
            width: 40px; height: 40px; min-width: 40px;
            border-radius: 50%;
            background: var(--company-color, var(--accent));
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px;
        }
        .emp-info strong { display: block; font-size: 13px; font-weight: 700; line-height: 1.2; }
        .emp-info span { font-size: 11px; color: var(--text-muted); }
        .emp-status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            margin-left: auto; flex-shrink: 0;
        }
        .emp-status-dot.in { background: var(--warning); }
        .emp-status-dot.out { background: var(--success); }
        .emp-status-dot.none { background: var(--border); }
        /* ---- Action Panel ---- */
        .action-panel {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 24px;
            display: none;
        }
        .action-panel.visible { display: block; }
        .selected-emp-name {
            font-size: 18px; font-weight: 800;
            margin-bottom: 4px;
        }
        .selected-emp-pos { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        .status-info {
            display: flex; gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .status-pill {
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 12px; font-weight: 600;
            display: flex; align-items: center; gap: 6px;
        }
        .status-pill.in { background: #fff3cd; color: #856404; }
        .status-pill.out { background: #d1fae5; color: #065f46; }
        .status-pill.none { background: #f1f5f9; color: var(--text-muted); }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-timein, .btn-timeout {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .btn-timein {
            background: var(--success);
            color: white;
        }
        .btn-timein:hover { background: #219a52; transform: translateY(-1px); }
        .btn-timeout {
            background: var(--danger);
            color: white;
        }
        .btn-timeout:hover { background: #c0392b; transform: translateY(-1px); }
        .btn-timein:disabled, .btn-timeout:disabled {
            opacity: 0.35; cursor: not-allowed; transform: none;
        }
        .location-info {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        /* ---- Log Table ---- */
        .log-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .log-header {
            padding: 14px 16px;
            font-weight: 700;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .log-table th { background: #f8fafc; padding: 8px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; }
        .log-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
        .log-table tr:last-child td { border-bottom: none; }
        .badge {
            padding: 3px 8px; border-radius: 99px;
            font-size: 11px; font-weight: 700;
        }
        .badge-in { background: #fff3cd; color: #856404; }
        .badge-out { background: #d1fae5; color: #065f46; }
        /* ---- Toast ---- */
        .toast {
            position: fixed;
            bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--primary);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px; font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
            z-index: 9999;
            display: flex; align-items: center; gap: 10px;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        /* ---- Loading spinner overlay ---- */
        .spinner-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center; justify-content: center;
            z-index: 9998;
            flex-direction: column;
            gap: 16px;
        }
        .spinner-overlay.active { display: flex; }
        .spinner { width: 48px; height: 48px; border: 5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-text { color: white; font-size: 14px; font-weight: 600; }
        /* ---- No-employees message ---- */
        .empty-emp {
            text-align: center; padding: 40px 24px;
            color: var(--text-muted);
        }
        .empty-emp i { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.4; }
        /* ---- Mode Tabs ---- */
        .mode-tabs {
            display: flex;
            gap: 0;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .mode-tab {
            flex: 1;
            padding: 10px 6px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .mode-tab.active {
            background: var(--company-color, var(--accent));
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        /* ---- PIN Keypad ---- */
        .pin-panel { display: none; }
        .pin-panel.visible { display: block; }
        .pin-display {
            background: #f8fafc;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 14px;
            font-family: monospace;
            min-height: 60px;
            color: var(--text);
        }
        .pin-display.has-value { border-color: var(--company-color, var(--accent)); }
        .pin-display.error { border-color: var(--danger); color: var(--danger); }
        .pin-display.found { border-color: var(--success); }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .key-btn {
            padding: 18px 10px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 22px;
            font-weight: 700;
            background: white;
            cursor: pointer;
            transition: all 0.12s;
            color: var(--text);
        }
        .key-btn:hover { border-color: var(--company-color, var(--accent)); background: var(--company-bg, #f0fdf4); }
        .key-btn:active { transform: scale(0.95); }
        .key-btn.key-clear { font-size: 14px; color: var(--danger); border-color: #fecaca; }
        .key-btn.key-back { font-size: 16px; color: var(--text-muted); }
        .pin-emp-card {
            background: white;
            border: 2px solid var(--success);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
        }
        .pin-emp-card.visible { display: flex; align-items: center; gap: 14px; }
        .pin-emp-avatar {
            width: 54px; height: 54px; min-width: 54px;
            border-radius: 50%;
            background: var(--company-color, var(--accent));
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 900;
        }
        /* ---- User ID Input ---- */
        .user-id-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        .user-id-input:focus {
            border-color: var(--company-color, var(--accent));
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .user-id-input::placeholder {
            letter-spacing: 1px;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
        }
        /* ---- Face Verification Panel ---- */
        .face-verification-panel {
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
            border: 2px solid #86efac;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        /* ---- Enroll Face Panel ---- */
        .enroll-face-panel {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 2px solid #fbbf24;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        /* ---- Face Scan Button ---- */
        .face-scan-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: var(--company-color, var(--accent));
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .face-scan-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .face-scan-btn:active { transform: translateY(0); }
        /* ---- Face Scan Security Note ---- */
        .face-scan-security {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        /* ---- Biometric Import Panel ---- */
        .bio-panel { display: none; }
        .bio-panel.visible { display: block; }
        .bio-section {
            background: white;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            padding: 18px;
            margin-bottom: 14px;
        }
        .bio-section h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
        .bio-section textarea {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            outline: none;
        }
        .bio-section textarea:focus { border-color: var(--company-color, var(--accent)); }
        .device-status {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: #f8fafc;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .device-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--border);
        }
        .device-dot.listening { background: var(--success); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .btn-import {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--company-color, var(--accent));
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-import:hover { filter: brightness(1.1); }
        .import-log {
            max-height: 200px;
            overflow-y: auto;
            font-size: 11px;
            margin-top: 10px;
        }
        .import-log-item {
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 4px;
            background: #f0fdf4;
            color: #166534;
        }
        .import-log-item.err { background: #fef2f2; color: #991b1b; }
        /* ---- Face Scan Panel ---- */
        .face-scan-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 9997; flex-direction: column; gap: 16px;
        }
        .face-scan-overlay.active { display: flex; }
        .face-scan-container {
            position: relative;
            width: 320px; height: 260px;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .face-scan-container video {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .face-scan-container canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .face-scan-guide {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .face-scan-guide .oval {
            width: 160px; height: 200px;
            border: 3px dashed rgba(0,255,180,0.6);
            border-radius: 50%;
        }
        .face-scan-status {
            color: white; font-size: 15px; font-weight: 700;
            text-align: center; max-width: 320px;
        }
        .face-scan-status .sub { font-size: 12px; font-weight: 400; opacity: 0.7; margin-top: 4px; }
        .face-scan-btns { display: flex; gap: 12px; }
        .face-scan-btns button {
            padding: 12px 28px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 700; cursor: pointer;
        }
        .btn-face-cancel { background: rgba(255,255,255,0.15); color: white; }
        .btn-face-retry { background: var(--warning); color: white; }
        .btn-face-enroll { background: var(--success); color: white; }
        /* ---- Footer ---- */
        .kiosk-footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="spinner-overlay" id="spinner">
    <div class="spinner"></div>
    <div class="spinner-text" id="spinnerText">Getting location…</div>
</div>

<div class="toast" id="toast"></div>

<!-- Face Scan Overlay -->
<div class="face-scan-overlay" id="faceScanOverlay">
    <div class="face-scan-status" id="faceScanStatus">
        Initializing camera…
        <div class="sub">Position your face within the oval guide</div>
    </div>
    <div class="face-scan-container">
        <video id="faceCamVideo" autoplay muted playsinline webkit-playsinline></video>
        <canvas id="faceCamCanvas"></canvas>
        <div class="face-scan-guide"><div class="oval"></div></div>
    </div>
    <div class="face-scan-btns">
        <button class="btn-face-cancel" onclick="cancelFaceScan()"><i class="fas fa-times"></i> Cancel</button>
        <button class="btn-face-enroll" id="btnFaceEnroll" onclick="enrollFaceNow()"><i class="fas fa-user-plus"></i> Enroll Face</button>
    </div>
</div>

<!-- App root rendered by JS -->
<div id="app"></div>

<script>
/* ============================================================
   UBMS Employee Time-In / Time-Out Kiosk
   Reads & writes to ubms_database localStorage key.
   No login required — accessible via shared link.
   ============================================================ */

const DB_KEY = 'ubms_database';

// ---- Dynamic API URL: works on any device (mobile, tablet, PC, LAN, GitHub Pages) ----
const API_BASE = (function() {
    const custom = localStorage.getItem('ubms_server_url');
    if (custom) return custom.replace(/\/$/, '') + '/api';
    const loc = window.location;
    if (loc.hostname.includes('github.io') || (loc.protocol === 'https:' && loc.port !== '3443')) {
        return 'http://10.56.221.132:3000/api';
    }
    if (loc.port === '3000' || loc.port === '3443') return loc.origin + '/api';
    if (loc.protocol === 'file:') return 'http://localhost:3000/api';
    return loc.protocol + '//' + loc.hostname + ':3000/api';
})();
const ATTENDANCE_API = API_BASE + '/attendance';

// ---- Capture snapshot from video element as base64 JPEG ----
function captureVideoSnapshot(videoEl) {
    if (!videoEl || !videoEl.videoWidth) return null;
    const canvas = document.createElement('canvas');
    canvas.width = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(videoEl, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.85);  // base64 JPEG at 85% quality
}

// ---- Upload face snapshot image to server ----
async function uploadFaceSnapshot({ attendanceId, employeeId, company, imageType, imageData, faceVerified, matchScore }) {
    try {
        await fetch(ATTENDANCE_API + '/snapshot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ attendanceId, employeeId, company, imageType, imageData, faceVerified, matchScore })
        });
    } catch { /* snapshot upload failed — non-blocking */ }
}

// ---- API helper for attendance sync ----
async function apiSyncClockIn(record) {
    try {
        await fetch(ATTENDANCE_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: record.id,
                employeeId: record.employeeId,
                company: state.company,
                date: record.date,
                timeIn: record.timeIn,
                timeInTimestamp: record.timeInTimestamp,
                status: record.status,
                lateMinutes: record.lateMinutes,
                notes: record.notes,
                location: record.location,
                source: record.source,
                faceVerified: record.faceVerified
            })
        });
    } catch { /* API unavailable — localStorage is primary */ }
}

async function apiSyncClockOut(recordId, data) {
    try {
        await fetch(`${ATTENDANCE_API}/${encodeURIComponent(recordId)}/clockout`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
    } catch { /* API unavailable — localStorage is primary */ }
}

const COMPANY_META = {
    dheekay:  { name: 'Dheekay Builders OPC',              color: '#16a085', logo: 'assets/logos/dheekay.png',  bg: '#e8f5f2', type: 'Construction' },
    kdchavit: { name: 'KDChavit Construction',             color: '#2c3e50', logo: 'assets/logos/kdchavit.png', bg: '#eaf0f6', type: 'Construction' },
    nuatthai: { name: 'Nuat Thai Foot & Body Massage',     color: '#b8860b', logo: 'assets/logos/nuatthai.png', bg: '#fdf8e1', type: 'Wellness' },
    autocasa: { name: 'AutoCasa Auto Expert & Repair',     color: '#e74c3c', logo: 'assets/logos/autocasa.png', bg: '#fdecea', type: 'Automotive' }
};

let state = {
    company: null,
    meta: null,
    employees: [],
    todayRecords: [],
    selectedEmployee: null,
    geoResult: null
};

// ---- Helpers ----
function now() { return new Date(); }
function todayStr() { const d = now(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function timeStr(d) {
    return d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', hour12: true });
}
function genId() {
    return 'ATT-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase();
}
function initials(name) {
    return name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
}

// ---- LocalStorage DB ----
function loadDB() {
    try {
        const s = localStorage.getItem(DB_KEY);
        return s ? JSON.parse(s) : null;
    } catch (e) { return null; }
}
function saveDB(db) {
    try { localStorage.setItem(DB_KEY, JSON.stringify(db)); return true; }
    catch (e) { return false; }
}

// ---- Toast ----
let toastTimer;
function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = '';
    const icon = document.createElement('i');
    icon.className = type === 'success' ? 'fas fa-check-circle' : type === 'error' ? 'fas fa-times-circle' : 'fas fa-info-circle';
    el.appendChild(icon);
    el.appendChild(document.createTextNode(' ' + msg));
    el.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ---- Spinner ----
function showSpinner(msg) {
    document.getElementById('spinnerText').textContent = msg || 'Please wait…';
    document.getElementById('spinner').classList.add('active');
}
function hideSpinner() { document.getElementById('spinner').classList.remove('active'); }

// ---- Geolocation ----
function getLocation(timeout = 8000) {
    return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
            pos => resolve({
                lat: pos.coords.latitude.toFixed(6),
                lng: pos.coords.longitude.toFixed(6),
                accuracy: Math.round(pos.coords.accuracy),
                mapsUrl: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
            }),
            () => resolve(null),
            { enableHighAccuracy: true, timeout, maximumAge: 30000 }
        );
    });
}

// ---- Live Clock ----
function startClock() {
    function tick() {
        const el = document.getElementById('liveClock');
        const de = document.getElementById('liveDate');
        if (!el) return;
        const n = now();
        el.textContent = n.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        if (de) de.textContent = n.toLocaleDateString('en-PH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    tick();
    setInterval(() => { tick(); refreshTodayPanel(); }, 1000);
}

// ---- Load state from DB ----
function loadState() {
    const db = loadDB();
    if (!db) return;
    const today = todayStr();
    state.employees = (db.employees || []).filter(e => e.company === state.company);
    state.todayRecords = (db.attendanceRecords || []).filter(r => {
        if (r.date !== today) return false;
        const emp = (db.employees || []).find(e => e.id === r.employeeId);
        return emp && emp.company === state.company;
    });
}

// ---- Get today record for employee ----
function getTodayRecord(employeeId) {
    return state.todayRecords.find(r => r.employeeId === employeeId) || null;
}

// ---- Render today's log table ----
function renderTodayLog() {
    const tbody = document.getElementById('logTableBody');
    const count = document.getElementById('logCount');
    if (!tbody) return;
    if (state.todayRecords.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">No records yet today</td></tr>`;
        if (count) count.textContent = '0 entries';
        return;
    }
    if (count) count.textContent = `${state.todayRecords.length} ${state.todayRecords.length === 1 ? 'entry' : 'entries'}`;
    tbody.innerHTML = state.todayRecords.map(r => {
        const emp = state.employees.find(e => e.id === r.employeeId);
        const statusClass = r.timeOut ? 'badge-out' : 'badge-in';
        const statusLabel = r.timeOut ? 'Complete' : 'Clocked In';
        // Build geo column
        let geoHtml = '—';
        if (r.location || r.locationOut) {
            let parts = [];
            if (r.location) {
                const acc = r.location.accuracy || '?';
                const accColor = acc <= 20 ? 'var(--success)' : acc <= 100 ? 'var(--warning)' : 'var(--danger)';
                parts.push(`<a href="${r.location.mapsUrl}" target="_blank" style="color:var(--company-color);font-size:10px;display:flex;align-items:center;gap:3px"><i class="fas fa-sign-in-alt"></i>In <span style="color:${accColor};font-weight:700">±${acc}m</span></a>`);
            }
            if (r.locationOut) {
                const acc = r.locationOut.accuracy || '?';
                const accColor = acc <= 20 ? 'var(--success)' : acc <= 100 ? 'var(--warning)' : 'var(--danger)';
                parts.push(`<a href="${r.locationOut.mapsUrl}" target="_blank" style="color:var(--danger);font-size:10px;display:flex;align-items:center;gap:3px"><i class="fas fa-sign-out-alt"></i>Out <span style="color:${accColor};font-weight:700">±${acc}m</span></a>`);
            }
            geoHtml = `<div style="display:flex;flex-direction:column;gap:2px">${parts.join('')}</div>`;
        }
        const srcBadge = r.source === 'biometric' ? ' <span style="background:#e8eaf6;color:#3f51b5;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700">BIO</span>' : '';
        return `<tr>
            <td><strong>${emp?.name || r.employeeId}</strong>${srcBadge}</td>
            <td>${r.timeIn || '—'}</td>
            <td>${r.timeOut || '<span style="color:var(--warning);font-size:11px">Pending</span>'}</td>
            <td><span class="badge ${statusClass}">${statusLabel}</span></td>
            <td>${geoHtml}</td>
        </tr>`;
    }).join('');
}

// ---- Periodically refresh today's panel without full re-render ----
let lastLogCount = 0;
function refreshTodayPanel() {
    if (state.todayRecords.length !== lastLogCount) {
        lastLogCount = state.todayRecords.length;
        renderTodayLog();
        // Refresh employee dots
        state.employees.forEach(emp => {
            const btn = document.getElementById(`empBtn_${emp.id}`);
            if (!btn) return;
            const dot = btn.querySelector('.emp-status-dot');
            if (!dot) return;
            const rec = getTodayRecord(emp.id);
            dot.className = `emp-status-dot ${!rec ? 'none' : rec.timeOut ? 'out' : 'in'}`;
        });
    }
    // Keep selected employee action panel current
    if (state.selectedEmployee) updateActionPanel();
}

// ---- Select employee ----
function selectEmployee(id) {
    state.selectedEmployee = id;
    document.querySelectorAll('.emp-btn').forEach(b => b.classList.remove('selected'));
    const btn = document.getElementById(`empBtn_${id}`);
    if (btn) btn.classList.add('selected');
    updateActionPanel();
    document.getElementById('actionPanel').classList.add('visible');
    // Smooth scroll to action panel
    document.getElementById('actionPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ---- Update action panel for selected employee ----
function updateActionPanel() {
    const emp = state.employees.find(e => e.id === state.selectedEmployee);
    if (!emp) return;
    const rec = getTodayRecord(emp.id);
    const nameEl = document.getElementById('actionEmpName');
    const posEl = document.getElementById('actionEmpPos');
    const statusEl = document.getElementById('actionStatus');
    const btnIn = document.getElementById('btnTimeIn');
    const btnOut = document.getElementById('btnTimeOut');
    if (!nameEl) return;

    nameEl.textContent = emp.name;
    posEl.textContent = `${emp.position || 'Employee'} · ${state.meta.name}`;

    if (!rec) {
        // Not yet clocked in
        statusEl.innerHTML = `<span class="status-pill none"><i class="fas fa-circle"></i> Not yet clocked in today</span>`;
        btnIn.disabled = false;
        btnOut.disabled = true;
        btnOut.style.opacity = '0.3';
    } else if (rec.timeIn && !rec.timeOut) {
        // Clocked in, not yet out
        statusEl.innerHTML = `<span class="status-pill in"><i class="fas fa-dot-circle"></i> Clocked In at ${rec.timeIn}</span>`;
        btnIn.disabled = true;
        btnIn.style.opacity = '0.3';
        btnOut.disabled = false;
        btnOut.style.opacity = '1';
    } else {
        // Both in and out
        statusEl.innerHTML = `<span class="status-pill out"><i class="fas fa-check-circle"></i> Clocked Out at ${rec.timeOut}</span><span class="status-pill in" style="background:#f0fdf4"><i class="fas fa-clock"></i> In: ${rec.timeIn}</span>`;
        btnIn.disabled = true;
        btnIn.style.opacity = '0.3';
        btnOut.disabled = true;
        btnOut.style.opacity = '0.3';
        document.getElementById('locationInfo').innerHTML = `<i class="fas fa-check-circle" style="color:var(--success)"></i> <span style="color:var(--success)">Attendance complete for today</span>`;
    }
}

// ---- Clock In ----
async function doClockIn() {
    if (!state.selectedEmployee) return;
    const emp = state.employees.find(e => e.id === state.selectedEmployee);
    if (!emp) return;
    const existing = getTodayRecord(emp.id);
    if (existing) { showToast('Already clocked in today!', 'error'); return; }

    showSpinner('Getting your location…');
    const geoResult = await getLocation();
    hideSpinner();

    if (!geoResult) {
        showToast('Geolocation is required to Time In. Please enable location services and try again.', 'error');
        return;
    }

    const timeInStr = timeStr(now());

    // Compute late minutes if schedule exists
    let lateMinutes = 0;
    const db = loadDB();
    const schedule = (db?.workSchedules || []).find(s => s.employeeId === emp.id);
    if (schedule) {
        const dayName = now().toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
        const daySchedule = schedule[dayName];
        if (daySchedule && !daySchedule.off && daySchedule.start) {
            const [sh, sm] = daySchedule.start.split(':').map(Number);
            const [ch, cm] = [now().getHours(), now().getMinutes()];
            const diff = (ch * 60 + cm) - (sh * 60 + sm);
            if (diff > 0) lateMinutes = diff;
        }
    }

    const record = {
        id: genId(),
        employeeId: emp.id,
        date: todayStr(),
        timeIn: timeInStr,
        timeInTimestamp: now().toISOString(),
        timeOut: null,
        timeOutTimestamp: null,
        status: lateMinutes > 0 ? 'late' : 'present',
        lateMinutes,
        undertimeMinutes: 0,
        overtimeHours: 0,
        notes: '',
        location: geoResult,
        locationOut: null,
        source: 'kiosk',
        faceVerified: pendingClockAction === 'in' || false
    };

    // Write to localStorage
    if (!db) { showToast('Database not found. Please open the main UBMS system first.', 'error'); return; }
    if (!db.attendanceRecords) db.attendanceRecords = [];
    db.attendanceRecords.push(record);
    if (!saveDB(db)) { showToast('Could not save. Storage may be full.', 'error'); return; }

    // Sync to backend API
    apiSyncClockIn(record);

    // Upload face snapshot if available (from face scan verification)
    if (lastFaceSnapshot) {
        uploadFaceSnapshot({
            attendanceId: record.id,
            employeeId: emp.id,
            company: state.company,
            imageType: 'clockin',
            imageData: lastFaceSnapshot,
            faceVerified: record.faceVerified,
            matchScore: lastFaceMatchScore
        });
        lastFaceSnapshot = null;
        lastFaceMatchScore = 0;
    }

    // Update local state
    state.todayRecords.push(record);

    updateActionPanel();
    renderTodayLog();

    // Refresh employee dot
    const btn = document.getElementById(`empBtn_${emp.id}`);
    if (btn) btn.querySelector('.emp-status-dot').className = 'emp-status-dot in';

    const locMsg = geoResult ? ` · GPS ±${geoResult.accuracy}m` : ` · No GPS`;
    if (lateMinutes > 0) {
        showToast(`TIME IN recorded — ${lateMinutes} min late${locMsg}`, 'error');
    } else {
        showToast(`TIME IN recorded at ${timeInStr}${locMsg}`, 'success');
    }
    updateLocationInfo(geoResult);

    // Reset PIN mode after success
    if (activeMode === 'pin') {
        setTimeout(() => { pinClear(); }, 2000);
    }
}

// ---- Clock Out ----
async function doClockOut() {
    if (!state.selectedEmployee) return;
    const emp = state.employees.find(e => e.id === state.selectedEmployee);
    if (!emp) return;
    const rec = getTodayRecord(emp.id);
    if (!rec || rec.timeOut) { showToast('No open clock-in found!', 'error'); return; }

    showSpinner('Getting your location…');
    const geoResult = await getLocation();
    hideSpinner();

    const timeOutStr = timeStr(now());

    // Compute undertime if schedule exists
    let undertimeMinutes = 0;
    const db = loadDB();
    const schedule = (db?.workSchedules || []).find(s => s.employeeId === emp.id);
    if (schedule) {
        const dayName = now().toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
        const daySchedule = schedule[dayName];
        if (daySchedule && !daySchedule.off && daySchedule.end) {
            const [eh, em] = daySchedule.end.split(':').map(Number);
            const [ch, cm] = [now().getHours(), now().getMinutes()];
            const diff = (eh * 60 + em) - (ch * 60 + cm);
            if (diff > 0) undertimeMinutes = diff;
        }
    }

    // Update record in DB
    const idx = (db.attendanceRecords || []).findIndex(r => r.id === rec.id);
    if (idx >= 0) {
        db.attendanceRecords[idx].timeOut = timeOutStr;
        db.attendanceRecords[idx].timeOutTimestamp = now().toISOString();
        db.attendanceRecords[idx].locationOut = geoResult;
        db.attendanceRecords[idx].undertimeMinutes = undertimeMinutes;
        if (!saveDB(db)) { showToast('Could not save. Storage may be full.', 'error'); return; }

        // Sync to backend API
        apiSyncClockOut(rec.id, {
            timeOut: timeOutStr,
            timeOutTimestamp: now().toISOString(),
            locationOut: geoResult,
            undertimeMinutes
        });

        // Upload face snapshot if available (from face scan verification)
        if (lastFaceSnapshot) {
            uploadFaceSnapshot({
                attendanceId: rec.id,
                employeeId: emp.id,
                company: state.company,
                imageType: 'clockout',
                imageData: lastFaceSnapshot,
                faceVerified: true,
                matchScore: lastFaceMatchScore
            });
            lastFaceSnapshot = null;
            lastFaceMatchScore = 0;
        }

        // Update local state
        rec.timeOut = timeOutStr;
        rec.timeOutTimestamp = now().toISOString();
        rec.locationOut = geoResult;
        rec.undertimeMinutes = undertimeMinutes;
    }

    updateActionPanel();
    renderTodayLog();
    const btn = document.getElementById(`empBtn_${emp.id}`);
    if (btn) btn.querySelector('.emp-status-dot').className = 'emp-status-dot out';

    const locMsg = geoResult ? ` · GPS ±${geoResult.accuracy}m` : ` · No GPS`;
    if (undertimeMinutes > 0) {
        showToast(`TIME OUT recorded — ${undertimeMinutes} min undertime${locMsg}`, 'error');
    } else {
        showToast(`TIME OUT recorded at ${timeOutStr}${locMsg}`, 'success');
    }
    updateLocationInfo(geoResult);

    // Reset PIN mode after success
    if (activeMode === 'pin') {
        setTimeout(() => { pinClear(); }, 2000);
    }
}

function updateLocationInfo(geo) {
    const el = document.getElementById('locationInfo');
    const elPin = document.getElementById('pinLocationInfo');
    [el, elPin].forEach(e => {
        if (!e) return;
        if (geo) {
            const acc = geo.accuracy || 0;
            const accColor = acc <= 20 ? 'var(--success)' : acc <= 100 ? 'var(--warning)' : 'var(--danger)';
            const accLabel = acc <= 20 ? 'Excellent' : acc <= 50 ? 'Good' : acc <= 100 ? 'Fair' : 'Poor';
            e.innerHTML = `
                <div style="display:flex;flex-direction:column;gap:4px;width:100%">
                    <div style="display:flex;align-items:center;gap:6px">
                        <i class="fas fa-map-marker-alt" style="color:var(--success)"></i>
                        <a href="${geo.mapsUrl}" target="_blank" style="color:var(--success);font-weight:600">Location recorded</a>
                        <span style="background:${accColor}20;color:${accColor};padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700">±${acc}m · ${accLabel}</span>
                    </div>
                    <div style="font-size:10px;color:var(--text-muted)">
                        <i class="fas fa-globe" style="margin-right:4px"></i>${geo.lat}, ${geo.lng}
                    </div>
                </div>`;
        } else {
            e.innerHTML = `<i class="fas fa-map-marker-slash" style="color:var(--danger)"></i> <span style="color:var(--danger)">Location unavailable — check browser permissions</span>`;
        }
    });
}

// ============================================================
let activeMode = 'browse'; // 'browse' | 'pin' | 'bio'

function switchMode(mode) {
    activeMode = mode;
    // Update tabs
    ['browse', 'pin', 'bio'].forEach(m => {
        const tab = document.getElementById('tab' + m.charAt(0).toUpperCase() + m.slice(1));
        if (tab) tab.classList.toggle('active', m === mode);
    });
    // Show/hide panels
    const browse = document.getElementById('modeBrowse');
    const pin = document.getElementById('modePin');
    const bio = document.getElementById('modeBio');
    const actionPanel = document.getElementById('actionPanel');
    if (browse) browse.style.display = mode === 'browse' ? '' : 'none';
    if (pin) pin.classList.toggle('visible', mode === 'pin');
    if (bio) bio.classList.toggle('visible', mode === 'bio');
    // Hide browse action panel when switching away
    if (mode !== 'browse' && actionPanel) actionPanel.classList.remove('visible');
    if (mode !== 'pin') {
        // Reset PIN state
        pinClear();
        if (document.getElementById('pinEmpCard')) document.getElementById('pinEmpCard').classList.remove('visible');
        if (document.getElementById('pinActionBtns')) document.getElementById('pinActionBtns').style.display = 'none';
    }
}

// ============================================================
//  USER ID + FACE SCAN (Alphanumeric Input)
// ============================================================
let pinBuffer = '';
let faceScanResolvedEmp = null;

function onUserIdInput(val) {
    pinBuffer = val.toUpperCase().trim();
    const input = document.getElementById('pinInput');
    if (input) input.value = pinBuffer;
    if (pinBuffer.length >= 3) {
        tryResolvePinEmployee();
    } else {
        hidePinEmployee();
    }
}

function pinClear() {
    pinBuffer = '';
    faceScanResolvedEmp = null;
    const input = document.getElementById('pinInput');
    if (input) input.value = '';
    hidePinEmployee();
}

function tryResolvePinEmployee() {
    const uid = pinBuffer;
    const emp = state.employees.find(e => String(e.userId).toUpperCase() === uid);
    if (emp) {
        state.selectedEmployee = emp.id;
        faceScanResolvedEmp = emp;
        showPinEmployee(emp);
    } else {
        hidePinEmployee();
    }
}

function showPinEmployee(emp) {
    const card = document.getElementById('pinEmpCard');
    const avatar = document.getElementById('pinEmpAvatar');
    const name = document.getElementById('pinEmpName');
    const pos = document.getElementById('pinEmpPos');
    const statusEl = document.getElementById('pinEmpStatus');
    const faceScanPrompt = document.getElementById('faceScanPrompt');
    const faceEnrollPrompt = document.getElementById('faceEnrollPrompt');
    const btns = document.getElementById('pinActionBtns');
    if (!card) return;
    card.classList.add('visible');
    avatar.textContent = initials(emp.name);
    avatar.style.background = state.meta.color;
    name.textContent = emp.name;
    pos.textContent = `${emp.position || 'Employee'} · ID: ${emp.userId}`;
    const rec = getTodayRecord(emp.id);
    if (!rec) {
        statusEl.innerHTML = `<span style="color:var(--text-muted)"><i class="fas fa-circle" style="font-size:9px"></i> Not yet clocked in</span>`;
    } else if (rec.timeIn && !rec.timeOut) {
        statusEl.innerHTML = `<span style="color:#856404"><i class="fas fa-dot-circle" style="font-size:9px"></i> Clocked In at ${rec.timeIn}</span>`;
    } else {
        statusEl.innerHTML = `<span style="color:var(--success)"><i class="fas fa-check-circle" style="font-size:9px"></i> Attendance complete</span>`;
    }
    
    // Check if employee has face enrolled
    checkFaceEnrollment(emp.id).then(hasDescriptor => {
        if (hasDescriptor) {
            // Face enrolled: show status message and TIME IN/OUT buttons
            if (faceScanPrompt) faceScanPrompt.style.display = 'block';
            if (faceEnrollPrompt) faceEnrollPrompt.style.display = 'none';
            if (btns) {
                btns.style.display = 'flex';
                // Set button states based on attendance record
                const pinBtnIn = document.getElementById('pinBtnIn');
                const pinBtnOut = document.getElementById('pinBtnOut');
                if (!rec) {
                    if (pinBtnIn) { pinBtnIn.disabled = false; pinBtnIn.style.opacity = '1'; }
                    if (pinBtnOut) { pinBtnOut.disabled = true; pinBtnOut.style.opacity = '0.3'; }
                } else if (rec.timeIn && !rec.timeOut) {
                    if (pinBtnIn) { pinBtnIn.disabled = true; pinBtnIn.style.opacity = '0.3'; }
                    if (pinBtnOut) { pinBtnOut.disabled = false; pinBtnOut.style.opacity = '1'; }
                } else {
                    if (pinBtnIn) { pinBtnIn.disabled = true; pinBtnIn.style.opacity = '0.3'; }
                    if (pinBtnOut) { pinBtnOut.disabled = true; pinBtnOut.style.opacity = '0.3'; }
                }
            }
        } else {
            // No face enrolled: show enrollment prompt, hide buttons
            if (faceScanPrompt) faceScanPrompt.style.display = 'none';
            if (faceEnrollPrompt) faceEnrollPrompt.style.display = 'block';
            if (btns) btns.style.display = 'none';
        }
    }).catch(() => {
        // If API fails, show enrollment prompt as fallback
        if (faceScanPrompt) faceScanPrompt.style.display = 'none';
        if (faceEnrollPrompt) faceEnrollPrompt.style.display = 'block';
        if (btns) btns.style.display = 'none';
    });
}

function hidePinEmployee() {
    state.selectedEmployee = null;
    faceScanResolvedEmp = null;
    const card = document.getElementById('pinEmpCard');
    const btns = document.getElementById('pinActionBtns');
    const faceScanPrompt = document.getElementById('faceScanPrompt');
    const faceEnrollPrompt = document.getElementById('faceEnrollPrompt');
    if (card) card.classList.remove('visible');
    if (btns) btns.style.display = 'none';
    if (faceScanPrompt) faceScanPrompt.style.display = 'none';
    if (faceEnrollPrompt) faceEnrollPrompt.style.display = 'none';
}

// ============================================================
//  FACE-TRIGGERED CLOCK IN/OUT
//  Flow: User clicks TIME IN/OUT → Face scan opens → Verify → Clock
// ============================================================
let pendingClockAction = null; // 'in' or 'out'
let lastFaceSnapshot = null;   // base64 JPEG from face scan video
let lastFaceMatchScore = 0;    // match score from last verification

function doFaceClockIn() {
    if (!faceScanResolvedEmp) { showToast('No employee selected', 'error'); return; }
    const rec = getTodayRecord(faceScanResolvedEmp.id);
    if (rec) { showToast('Already clocked in today!', 'error'); return; }
    pendingClockAction = 'in';
    startFaceScan('clock');
}

function doFaceClockOut() {
    if (!faceScanResolvedEmp) { showToast('No employee selected', 'error'); return; }
    const rec = getTodayRecord(faceScanResolvedEmp.id);
    if (!rec || rec.timeOut) { showToast('No open clock-in found!', 'error'); return; }
    pendingClockAction = 'out';
    startFaceScan('clock');
}

// ============================================================
//  FACE ENROLLMENT CHECK
// ============================================================
async function checkFaceEnrollment(employeeId) {
    try {
        const response = await fetch(`${ATTENDANCE_API}/face/${encodeURIComponent(employeeId)}`);
        if (!response.ok) {
            if (response.status === 404) return false; // No face descriptor found
            throw new Error(`HTTP ${response.status}`);
        }
        const result = await response.json();
        return result && result.data && result.data.descriptor; // Returns true if descriptor exists
    } catch (err) {
        console.warn('Face enrollment check failed:', err);
        return false; // Default to not enrolled if API fails
    }
}

// ============================================================
//  FACE RECOGNITION (face-api.js)
// ============================================================
const FACE_API_MODEL_URL = 'https://cdn.jsdelivr.net/gh/nicolo-ribaudo/face-api.js-models@master/';
let faceModelsLoaded = false;
let faceStream = null;
let faceDetectionInterval = null;
let faceScanMode = 'clock'; // 'clock' or 'enroll'

async function loadFaceModels() {
    if (faceModelsLoaded) return;
    if (typeof faceapi === 'undefined') {
        showToast('Face recognition library not loaded. Check your internet connection.', 'error');
        return;
    }
    try {
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(FACE_API_MODEL_URL),
            faceapi.nets.faceLandmark68TinyNet.loadFromUri(FACE_API_MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(FACE_API_MODEL_URL)
        ]);
        faceModelsLoaded = true;
    } catch (err) {
        showToast('Failed to load face recognition models: ' + err.message, 'error');
    }
}

async function startFaceScan(mode) {
    faceScanMode = mode || 'clock';
    showSpinner('Loading face recognition models…');
    await loadFaceModels();
    hideSpinner();
    if (!faceModelsLoaded) return;

    const overlay = document.getElementById('faceScanOverlay');
    const video = document.getElementById('faceCamVideo');
    const statusEl = document.getElementById('faceScanStatus');
    const enrollBtn = document.getElementById('btnFaceEnroll');
    if (!overlay || !video) return;

    // Show overlay
    overlay.style.display = 'flex';
    if (statusEl) {
        statusEl.innerHTML = faceScanMode === 'enroll' 
            ? 'Starting camera for face enrollment…<div class="sub">Keep your face within the oval guide</div>'
            : 'Starting camera for face verification…<div class="sub">Position your face within the oval guide</div>';
    }
    if (enrollBtn) enrollBtn.style.display = faceScanMode === 'enroll' ? 'inline-flex' : 'none';

    try {
        // Try front camera first (user-facing), fall back to any camera for mobile compatibility
        try {
            faceStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
            });
        } catch {
            faceStream = await navigator.mediaDevices.getUserMedia({ video: true });
        }
        video.srcObject = faceStream;
        video.setAttribute('playsinline', 'true');
        await video.play();
        if (statusEl) statusEl.textContent = 'Position your face inside the oval…';

        // Start detection loop
        faceDetectionInterval = setInterval(async () => {
            try {
                const detection = await faceapi
                    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
                    .withFaceLandmarks(true)
                    .withFaceDescriptor();

                const canvas = document.getElementById('faceCamCanvas');

                if (detection) {
                    if (statusEl) statusEl.textContent = 'Face detected! Hold still…';
                    statusEl.style.color = '#22c55e';

                    // Draw box on canvas
                    if (canvas) {
                        const dims = faceapi.matchDimensions(canvas, video, true);
                        const resized = faceapi.resizeResults(detection, dims);
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        faceapi.draw.drawDetections(canvas, [resized]);
                    }

                    if (faceScanMode === 'clock') {
                        await verifyFaceAndClock(detection.descriptor);
                    }
                    // For enroll mode, user presses the enroll button
                } else {
                    if (statusEl) {
                        statusEl.textContent = 'Position your face inside the oval…';
                        statusEl.style.color = '#fbbf24';
                    }
                    if (canvas) {
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                }
            } catch (err) { /* detection frame error, continue */ }
        }, 500);
    } catch (err) {
        if (statusEl) statusEl.textContent = 'Camera error: ' + err.message;
        showToast('Camera access denied or unavailable. Please allow camera permissions.', 'error');
    }
}

function cancelFaceScan() {
    stopFaceScan();
    const overlay = document.getElementById('faceScanOverlay');
    if (overlay) overlay.style.display = 'none';
}

function stopFaceScan() {
    if (faceDetectionInterval) { clearInterval(faceDetectionInterval); faceDetectionInterval = null; }
    if (faceStream) {
        faceStream.getTracks().forEach(t => t.stop());
        faceStream = null;
    }
    const video = document.getElementById('faceCamVideo');
    if (video) { video.pause(); video.srcObject = null; }
}

// Verify captured face against stored descriptor
async function verifyFaceAndClock(capturedDescriptor) {
    if (!faceScanResolvedEmp) { showToast('No employee selected', 'error'); return; }
    clearInterval(faceDetectionInterval); faceDetectionInterval = null;
    const emp = faceScanResolvedEmp;
    const statusEl = document.getElementById('faceScanStatus');
    if (statusEl) { statusEl.textContent = 'Verifying identity…'; statusEl.style.color = '#3b82f6'; }

    try {
        // Get stored face descriptor from backend using employee ID
        const resp = await fetch(`${ATTENDANCE_API}/face/${encodeURIComponent(emp.id)}`);
        if (!resp.ok) {
            stopFaceScan();
            const overlay = document.getElementById('faceScanOverlay');
            if (overlay) overlay.style.display = 'none';
            showToast('Face verification server error. Please contact admin.', 'error');
            return;
        }
        const data = await resp.json();
        if (!data.data || !data.data.descriptor) {
            stopFaceScan();
            const overlay = document.getElementById('faceScanOverlay');
            if (overlay) overlay.style.display = 'none';
            showToast(`No face enrolled for ${emp.name}. Please enroll first.`, 'error');
            return;
        }
        const storedRaw = typeof data.data.descriptor === 'string' ? JSON.parse(data.data.descriptor) : data.data.descriptor;
        const storedDescriptor = new Float32Array(storedRaw);

        // Compare faces — Euclidean distance, threshold 0.6
        const distance = faceapi.euclideanDistance(capturedDescriptor, storedDescriptor);
        const MATCH_THRESHOLD = 0.6;

        if (distance < MATCH_THRESHOLD) {
            // Face matched! — capture snapshot before stopping camera
            const video = document.getElementById('faceCamVideo');
            lastFaceSnapshot = captureVideoSnapshot(video);
            lastFaceMatchScore = parseFloat(((1 - distance) * 100).toFixed(1));

            stopFaceScan();
            const overlay = document.getElementById('faceScanOverlay');
            if (overlay) overlay.style.display = 'none';
            const matchPct = ((1 - distance) * 100).toFixed(0);
            showToast(`Face verified for ${emp.name}! (${matchPct}% match)`, 'success');
            
            // Execute the pending clock action
            if (pendingClockAction === 'in') {
                await doClockIn();
            } else if (pendingClockAction === 'out') {
                await doClockOut();
            }
            pendingClockAction = null;
        } else {
            // Face did not match
            if (statusEl) {
                statusEl.textContent = `Face does not match! (${((1 - distance) * 100).toFixed(0)}% match)`;
                statusEl.style.color = '#ef4444';
            }
            showToast('Face verification failed. Please try again.', 'error');
            // Restart detection after a delay
            setTimeout(() => {
                if (document.getElementById('faceScanOverlay')?.style.display !== 'none') {
                    faceDetectionInterval = setInterval(async () => {
                        try {
                            const det = await faceapi
                                .detectSingleFace(document.getElementById('faceCamVideo'), new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
                                .withFaceLandmarks(true)
                                .withFaceDescriptor();
                            if (det) {
                                if (statusEl) { statusEl.textContent = 'Face detected! Verifying…'; statusEl.style.color = '#22c55e'; }
                                await verifyFaceAndClock(det.descriptor);
                            }
                        } catch (err) { /* continue */ }
                    }, 500);
                }
            }, 2000);
        }
    } catch (err) {
        // Backend unreachable — allow offline mode with warning
        stopFaceScan();
        const overlay = document.getElementById('faceScanOverlay');
        if (overlay) overlay.style.display = 'none';
        showToast('Face verification server unavailable. Please contact admin.', 'error');
    }
}

// Enroll current face
async function enrollFaceNow() {
    if (!faceScanResolvedEmp) { showToast('No employee selected', 'error'); return; }
    const video = document.getElementById('faceCamVideo');
    const statusEl = document.getElementById('faceScanStatus');
    if (!video) return;

    if (statusEl) { statusEl.textContent = 'Capturing face data…'; statusEl.style.color = '#3b82f6'; }

    try {
        const detection = await faceapi
            .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
            .withFaceLandmarks(true)
            .withFaceDescriptor();

        if (!detection) {
            if (statusEl) { statusEl.textContent = 'No face detected. Look at the camera and try again.'; statusEl.style.color = '#ef4444'; }
            return;
        }

        // Capture enrollment photo from video
        const enrollPhoto = captureVideoSnapshot(video);

        // Send descriptor + enrollment photo to backend
        const resp = await fetch(`${ATTENDANCE_API}/face/enroll`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                employeeId: faceScanResolvedEmp.id,
                descriptor: Array.from(detection.descriptor),
                enrollPhoto: enrollPhoto,
                company: state.company
            })
        });

        if (resp.ok) {
            stopFaceScan();
            const overlay = document.getElementById('faceScanOverlay');
            if (overlay) overlay.style.display = 'none';
            showToast(`Face enrolled successfully for ${faceScanResolvedEmp.name}!`, 'success');
        } else {
            const err = await resp.json().catch(() => ({}));
            showToast('Enrollment failed: ' + (err.error || 'Unknown error'), 'error');
        }
    } catch (err) {
        showToast('Enrollment error: ' + err.message, 'error');
    }
}

// ============================================================
//  BIOMETRIC CSV IMPORT
// ============================================================
function importBioCSV() {
    const raw = (document.getElementById('bioCSV')?.value || '').trim();
    if (!raw) { showToast('No CSV data to import', 'error'); return; }
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    const logEl = document.getElementById('bioImportLog');
    if (logEl) logEl.innerHTML = '';

    let processed = 0, skipped = 0;
    const db = loadDB();
    if (!db) { showToast('Database not found', 'error'); return; }
    if (!db.attendanceRecords) db.attendanceRecords = [];
    if (!db.biometricLogs) db.biometricLogs = [];

    // Skip header row if present
    const dataLines = lines[0].toLowerCase().includes('userid') ? lines.slice(1) : lines;

    dataLines.forEach(line => {
        const parts = line.split(',').map(s => s.trim());
        if (parts.length < 4) { logEntry(logEl, `Skipped (bad format): ${line}`, true); skipped++; return; }
        const [userId, date, time, typeRaw] = parts;
        // Normalize type
        const typeStr = typeRaw.toLowerCase();
        const type = (typeStr === 'in' || typeStr === '0' || typeStr === 'check-in') ? 'in' : 'out';
        // Find employee by userId
        const emp = (db.employees || []).find(e => String(e.userId) === String(userId));
        if (!emp) { logEntry(logEl, `User ID ${userId}: Not found in employee list`, true); skipped++; return; }
        // Filter to company
        if (emp.company !== state.company) { logEntry(logEl, `${emp.name}: Different company — skipped`, true); skipped++; return; }

        // Parse datetime
        let ts;
        try { ts = new Date(`${date}T${time.includes(':') ? time : time + ':00'}`); }
        catch { ts = new Date(); }
        const dateStr = date;
        const timeStr12 = ts.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', hour12: true });

        if (type === 'in') {
            // Check if already clocked in
            const existing = db.attendanceRecords.find(r => r.employeeId === emp.id && r.date === dateStr);
            if (existing) { logEntry(logEl, `${emp.name} ${dateStr}: Already has a record — skipped`, true); skipped++; return; }
            const rec = {
                id: genId(),
                employeeId: emp.id,
                date: dateStr,
                timeIn: timeStr12,
                timeInTimestamp: ts.toISOString(),
                timeOut: null, timeOutTimestamp: null,
                status: 'present',
                lateMinutes: 0, undertimeMinutes: 0, overtimeHours: 0,
                notes: '', location: null, locationOut: null,
                source: 'biometric'
            };
            db.attendanceRecords.push(rec);
            logEntry(logEl, `✓ ${emp.name} — TIME IN ${timeStr12} on ${dateStr}`);
            processed++;
        } else {
            // Time Out — update existing record
            const existing = db.attendanceRecords.find(r => r.employeeId === emp.id && r.date === dateStr && !r.timeOut);
            if (!existing) { logEntry(logEl, `${emp.name} ${dateStr}: No open time-in found — skipped`, true); skipped++; return; }
            existing.timeOut = timeStr12;
            existing.timeOutTimestamp = ts.toISOString();
            existing.source = 'biometric';
            logEntry(logEl, `✓ ${emp.name} — TIME OUT ${timeStr12} on ${dateStr}`);
            processed++;
        }

        // Store in biometricLogs
        db.biometricLogs.push({ userId, employeeId: emp.id, timestamp: ts.toISOString(), type, source: 'csv_import', importedAt: new Date().toISOString() });
    });

    if (!saveDB(db)) { showToast('Could not save. Storage may be full.', 'error'); return; }
    loadState();
    renderTodayLog();
    showToast(`Import done: ${processed} processed, ${skipped} skipped`, processed > 0 ? 'success' : '');
}

function logEntry(container, msg, isErr = false) {
    if (!container) return;
    const d = document.createElement('div');
    d.className = 'import-log-item' + (isErr ? ' err' : '');
    d.textContent = msg;
    container.appendChild(d);
}

// ============================================================
//  BIOMETRIC HARDWARE QUEUE POLLING
// ============================================================
const BIO_QUEUE_KEY = 'ubms_biometric_queue';

function startBioQueuePoll() {
    setInterval(processBioQueue, 3000);
}

function processBioQueue() {
    try {
        const raw = localStorage.getItem(BIO_QUEUE_KEY);
        if (!raw) return;
        const queue = JSON.parse(raw);
        if (!Array.isArray(queue) || queue.length === 0) return;

        const db = loadDB();
        if (!db) return;
        if (!db.attendanceRecords) db.attendanceRecords = [];
        if (!db.biometricLogs) db.biometricLogs = [];

        let processed = 0;
        const remaining = [];
        const logEl = document.getElementById('bioQueueLog');

        queue.forEach(item => {
            const { userId, timestamp, type } = item || {};
            if (!userId || !timestamp || !type) { remaining.push(item); return; }
            const ts = new Date(timestamp);
            const dateStr = ts.toISOString().split('T')[0];
            const timeStr12 = ts.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', hour12: true });
            const emp = (db.employees || []).find(e => String(e.userId) === String(userId) && e.company === state.company);
            if (!emp) { remaining.push(item); return; }

            if (type === 'in') {
                const dup = db.attendanceRecords.find(r => r.employeeId === emp.id && r.date === dateStr);
                if (dup) return; // Already exists
                db.attendanceRecords.push({
                    id: genId(), employeeId: emp.id, date: dateStr,
                    timeIn: timeStr12, timeInTimestamp: ts.toISOString(),
                    timeOut: null, timeOutTimestamp: null,
                    status: 'present', lateMinutes: 0, undertimeMinutes: 0, overtimeHours: 0,
                    notes: '', location: null, locationOut: null, source: 'biometric'
                });
            } else {
                const rec = db.attendanceRecords.find(r => r.employeeId === emp.id && r.date === dateStr && !r.timeOut);
                if (rec) { rec.timeOut = timeStr12; rec.timeOutTimestamp = ts.toISOString(); rec.source = 'biometric'; }
            }
            db.biometricLogs.push({ userId, employeeId: emp.id, timestamp: ts.toISOString(), type, source: 'hardware', processedAt: new Date().toISOString() });
            logEntry(logEl, `[Device] ${emp.name} — ${type.toUpperCase()} at ${timeStr12}`);
            processed++;
        });

        if (processed > 0) {
            // Clear processed items, keep unprocessed
            localStorage.setItem(BIO_QUEUE_KEY, JSON.stringify(remaining));
            saveDB(db);
            loadState();
            renderTodayLog();
            // Update device dot status label
            const statusEl = document.getElementById('deviceStatusText');
            if (statusEl) statusEl.textContent = `Last sync: ${new Date().toLocaleTimeString('en-PH')} — ${processed} record(s) processed`;
        }
    } catch (e) { /* silently ignore poll errors */ }
}

// ---- Bootstrap ----
(function init() {
    const params = new URLSearchParams(window.location.search);
    const company = (params.get('company') || params.get('co') || '').toLowerCase().trim();
    const role = (params.get('role') || '').toLowerCase().trim(); // 'manager' or 'employee'
    const meta = COMPANY_META[company] || null;
    state.company = company || null;
    state.meta = meta;
    state.role = role;

    loadState();
    renderApp();

    // After render, enforce role-based tab visibility
    if (role === 'employee') {
        // Employees only see User ID + Face tab
        const tabBrowse = document.getElementById('tabBrowse');
        const tabBio = document.getElementById('tabBio');
        if (tabBrowse) tabBrowse.style.display = 'none';
        if (tabBio) tabBio.style.display = 'none';
        // Auto-switch to User ID + Face mode
        switchMode('pin');
    }
})();
</script>
